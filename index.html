<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#070b1e" />
  <title>Firefly Night</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🌙</text></svg>" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD overlay: score / level / weapon / combo -->
  <div id="hud" class="hud hidden">
    <div class="hud-left">
      <div id="hud-score" class="hud-score">0</div>
      <div id="hud-level" class="hud-level">Lv 1</div>
      <div id="hud-lives" class="hud-lives">🧡 15</div>
    </div>
    <div class="hud-center">
      <div id="hud-combo" class="hud-combo hidden">
        🔥 <span id="hud-combo-count">0</span> · <span id="hud-combo-mult">×1</span>
      </div>
    </div>
    <div class="hud-right">
      <div id="hud-weapon" class="hud-weapon">🔦</div>
      <button id="btn-rain" class="btn-mute btn-off" aria-label="Toggle rain sound">🌧️</button>
      <button id="btn-mute" class="btn-mute" aria-label="Toggle sound">🔊</button>
      <button id="btn-home" class="btn-mute" aria-label="Menu / change mode">☰</button>
    </div>
  </div>

  <!-- Level-up banner -->
  <div id="banner" class="banner hidden"></div>

  <!-- Start screen: pick a mode. ▶🎯 = challenge (15 lives), ∞🍃 = relax (endless) -->
  <div id="start-overlay" class="start-overlay">
    <h1 class="start-title">🌙 Firefly Night</h1>
    <p class="start-subtitle">👆 🐛 = ⭐&ensp;·&ensp;💨 🐛 = −1 🧡</p>
    <div class="mode-row">
      <button id="btn-start" class="mode-btn">
        <img class="mode-badge" src="assets/images/mode-game.png" alt="Game mode" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'mode-icon',textContent:'▶ 🎯'}))" />
        <span class="mode-sub">🧡 × 15</span>
      </button>
      <button id="btn-relax" class="mode-btn">
        <img class="mode-badge" src="assets/images/mode-relax.png" alt="Relax mode" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'mode-icon',textContent:'∞ 🍃'}))" />
        <span class="mode-sub">🎧 🐛</span>
      </button>
    </div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-overlay" class="start-overlay hidden">
    <h1 class="start-title">🌙 💤</h1>
    <p id="gameover-stats" class="start-subtitle"></p>
    <button id="btn-restart" class="btn-start">🔄</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
